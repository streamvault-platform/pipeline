  #           {
  #             "image": "ghcr.io/${{ github.repository_owner }}/streamvault-pipeline:${{ needs.docker.outputs.image_tag }}",
  #             "tag": "${{ needs.docker.outputs.image_tag }}",
  #             "ref": "${{ github.ref }}"
  #           }
