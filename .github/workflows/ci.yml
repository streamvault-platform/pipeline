  #           {
  #             "image": "ghcr.io/${{ github.repository_owner }}/pipeline:${{ needs.docker.outputs.image_tag }}",
  #             "tag": "${{ needs.docker.outputs.image_tag }}",
  #             "ref": "${{ github.ref }}"
  #           }
