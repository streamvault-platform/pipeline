name: CI / CD

on:
  pull_request:
  push:
    branches: [develop, release]
    tags: ["v*"]

jobs:
  # ── Compile & extract version (fail fast) ──────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - uses: sbt/setup-sbt@v1

      - uses: actions/cache@v5
        with:
          path: |
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt',
            '**/project/build.properties', '**/project/plugins.sbt') }}
          restore-keys: ${{ runner.os }}-sbt-

      - name: Extract version from build.sbt
        id: version
        run: |
          APP_VERSION=$(grep 'version\s*:=' build.sbt | head -1 \
            | grep -o '"[^"]*"' | tr -d '"' | sed 's/-SNAPSHOT//')
          echo "app_version=${APP_VERSION}" >> $GITHUB_OUTPUT

      - name: Compile
        run: sbt compile

      - name: Upload compiled classes
        uses: actions/upload-artifact@v7
        with:
          name: compiled-classes
          path: target/scala-3.8.3/classes/
          retention-days: 1

  # ── Unit tests (no Docker; ffmpeg required for TranscoderSpec) ───────────────
  unit-test:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - uses: sbt/setup-sbt@v1

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - uses: actions/cache@v5
        with:
          path: |
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt',
            '**/project/build.properties', '**/project/plugins.sbt') }}
          restore-keys: ${{ runner.os }}-sbt-

      - name: Restore compiled classes
        uses: actions/download-artifact@v8
        with:
          name: compiled-classes
          path: target/scala-3.8.3/classes/

      - name: Run unit tests
        run: sbt coverage unit-test

      - name: Upload scoverage data
        uses: actions/upload-artifact@v7
        with:
          name: scoverage-unit
          path: target/scala-3.8.3/scoverage-data/
          retention-days: 1

  # ── Integration tests (Kafka via Testcontainers; Docker pre-installed on ubuntu-latest) ──
  integration-test:
    name: Integration Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - uses: sbt/setup-sbt@v1

      - uses: actions/cache@v5
        with:
          path: |
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt',
            '**/project/build.properties', '**/project/plugins.sbt') }}
          restore-keys: ${{ runner.os }}-sbt-

      - name: Restore compiled classes
        uses: actions/download-artifact@v8
        with:
          name: compiled-classes
          path: target/scala-3.8.3/classes/

      - name: Run integration tests
        run: sbt coverage integration-test

      - name: Upload scoverage data
        uses: actions/upload-artifact@v7
        with:
          name: scoverage-it
          path: target/scala-3.8.3/scoverage-data/
          retention-days: 1

  # ── Coverage summary (after both test jobs pass) ──────────────────────────
  coverage:
    name: Coverage
    needs: [unit-test, integration-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - uses: sbt/setup-sbt@v1

      - uses: actions/cache@v5
        with:
          path: |
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt',
            '**/project/build.properties', '**/project/plugins.sbt') }}
          restore-keys: ${{ runner.os }}-sbt-

      - name: Download unit test coverage data
        uses: actions/download-artifact@v8
        with:
          name: scoverage-unit
          path: target/scala-3.8.3/scoverage-data/

      - name: Download integration test coverage data
        uses: actions/download-artifact@v8
        with:
          name: scoverage-it
          path: target/scala-3.8.3/scoverage-data/

      - name: Compile with scoverage instrumentation
        run: sbt coverage compile

      - name: Generate and print coverage report
        run: sbt coverageReport

  # ── Build & push Docker image to GHCR ──────────────────────────────────────
  # sbt assembly runs here (not inside Docker). Dockerfile is a pure packaging
  # step: copy pre-built JAR onto the JRE base image. Dependency resolution is
  # covered by the shared coursier cache.
  docker:
    name: Build & push image
    needs: [build, unit-test, integration-test]
    if: >
      github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/release'
      || github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - uses: sbt/setup-sbt@v1

      - uses: actions/cache@v5
        with:
          path: |
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt',
            '**/project/build.properties', '**/project/plugins.sbt') }}
          restore-keys: ${{ runner.os }}-sbt-

      - name: Compute image tag
        id: tag
        run: |
          VERSION="${{ needs.build.outputs.app_version }}"
          if [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "image_tag=${VERSION}-dev" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/release" ]]; then
            echo "image_tag=${VERSION}-rc.${{ github.run_number }}" >> $GITHUB_OUTPUT
          else
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [ "${TAG_VERSION}" != "${VERSION}" ]; then
              echo "Tag (${TAG_VERSION}) does not match build.sbt version (${VERSION})" >&2
              exit 1
            fi
            echo "image_tag=${VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Assemble fat JAR
        run: sbt assembly

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/pipeline:${{
            steps.tag.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  # ── Notify infra repo so it can update image references ────────────────────
  # Requires a PAT (repo + workflow scope) stored as INFRA_DISPATCH_TOKEN.
  # The infra workflow listens for event-type: pipeline-image-published.
